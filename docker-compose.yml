# =====================================================================
# docker-compose.yml  (BONUS — Neo4j prêt à l'emploi avec Docker)
#
#   docker compose up -d
#   -> Neo4j Browser : http://localhost:7474   (neo4j / cybercorp123)
#   -> Bolt          : bolt://localhost:7687
#
# Le dossier ./data est monté dans le répertoire "import" de Neo4j,
# ce qui permet d'utiliser LOAD CSV FROM 'file:///users.csv' etc.
# APOC est activé pour l'import générique des relations (07_*.cypher).
# =====================================================================
services:
  neo4j:
    image: neo4j:5.20-community
    container_name: cybercorp-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/cybercorp123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - ./data:/var/lib/neo4j/import   # CSV accessibles via file:///
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
